// ===== STATE =====
let currentScreen = 'list';
let listView = 'stage'; // 'stage' | 'deadline'
let detailId = null;
let detailStage = null;

// ===== NAVIGATION =====
function navigate(screen, id) {
  document.getElementById('screen-list').classList.add('hidden');
  document.getElementById('screen-detail').classList.add('hidden');
  document.getElementById('screen-new').classList.add('hidden');

  currentScreen = screen;
  if (screen === 'list') {
    document.getElementById('screen-list').classList.remove('hidden');
    renderList();
  } else if (screen === 'detail') {
    detailId = id;
    const s = subsidies.find(x => x.id === id);
    detailStage = s ? s.stage : 'draft';
    document.getElementById('screen-detail').classList.remove('hidden');
    renderDetail(id);
  } else if (screen === 'new') {
    document.getElementById('screen-new').classList.remove('hidden');
    resetTypeGrid();
  }
  lucide.createIcons();
}

// ===== LIST VIEW TOGGLE =====
function toggleListView() {
  listView = listView === 'stage' ? 'deadline' : 'stage';
  document.getElementById('view-toggle-btn').textContent = listView === 'stage' ? '階段' : '截止日';
  renderList();
}

// ===== URGENCY =====
function getUrgency(deadline) {
  if (!deadline) return { level: 'none', border: 'border-l-slate-600', label: '未設定', labelClass: 'text-slate-500' };
  const diff = Math.ceil((new Date(deadline) - new Date()) / 86400000);
  if (diff < 0) return { level: 'overdue', border: 'border-l-red-500', label: '已逾期', labelClass: 'text-red-400' };
  if (diff < 30) return { level: 'urgent', border: 'border-l-red-500', label: `剩 ${diff} 天`, labelClass: 'text-red-400' };
  if (diff < 60) return { level: 'warning', border: 'border-l-amber-400', label: `剩 ${diff} 天`, labelClass: 'text-amber-400' };
  return { level: 'ok', border: 'border-l-green-500', label: `剩 ${diff} 天`, labelClass: 'text-green-400' };
}

// ===== RENDER CARD =====

  const stageInfo = STAGES.find(st => st.key === s.stage);
  const urgency = getUrgency(s.deadline);
  const typeBadge = TYPE_BADGES[s.program_type] || TYPE_BADGES.other;
  const typeLabel = TYPE_LABELS[s.program_type] || s.program_type;
  return `
    <div onclick="navigate('detail', ${s.id})" class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-4 cursor-pointer hover:border-slate-500 dark:hover:border-slate-500 transition-colors border-l-4 ${urgency.border}">
      <div class="flex items-start justify-between gap-2 mb-2">
        <h3 class="text-sm font-medium text-slate-900 dark:text-slate-100 leading-tight">${s.name}</h3>
        <span class="px-2 py-0.5 rounded-full text-[11px] font-medium shrink-0 ${stageInfo.badge}">${stageInfo.label}</span>
      </div>
      <p class="text-xs text-slate-500 dark:text-slate-400 mb-2">${s.agency}</p>
      <div class="flex items-center gap-2 flex-wrap">
        <span class="px-2 py-0.5 rounded-full text-[11px] font-medium ${typeBadge}">${typeLabel}</span>
        ${s.deadline ? `<span class="text-xs ${urgency.labelClass}">${urgency.label} (${s.deadline})</span>` : '<span class="text-xs text-slate-500">截止日未定</span>'}
        ${s.funding_amount ? `<span class="text-xs text-slate-400 ml-auto">${s.funding_amount}</span>` : ''}
      </div>
    </div>
  `;
}

// ===== RENDER LIST =====
function renderList() {
  const stageView = document.getElementById('list-stage-view');
  const deadlineView = document.getElementById('list-deadline-view');

  if (listView === 'stage') {
    stageView.classList.remove('hidden');
    deadlineView.classList.add('hidden');

    let html = '';
    for (const stage of STAGES) {
      const items = subsidies.filter(s => s.stage === stage.key);
      html += `
        <div class="view-fade">
          <div class="flex items-center gap-2 mb-2">
            <div class="w-2 h-2 rounded-full ${stage.color}"></div>
            <span class="text-xs font-medium ${stage.text}">${stage.label}</span>
            <span class="text-xs text-slate-500">${items.length}</span>
          </div>
          ${items.length > 0 ? `<div class="space-y-2">${items.map(renderCard).join('')}</div>` : '<p class="text-xs text-slate-600 pl-4 pb-1">--</p>'}
        </div>
      `;
    }
    stageView.innerHTML = html;
  } else {
    stageView.classList.add('hidden');
    deadlineView.classList.remove('hidden');

    const sorted = [...subsidies].sort((a, b) => {
      if (!a.deadline) return 1;
      if (!b.deadline) return -1;
      return new Date(a.deadline) - new Date(b.deadline);
    });

    deadlineView.innerHTML = `<div class="space-y-2 view-fade">${sorted.map(renderCard).join('')}</div>`;
  }
  lucide.createIcons();
}

// ===== RENDER DETAIL =====
function renderDetail(id) {
  const s = subsidies.find(x => x.id === id);
  if (!s) return;

  document.getElementById('detail-title').textContent = s.name;

  // Pipeline bar
  const pipelineHtml = `
    <div class="flex gap-1">
      ${STAGES.map(st => {
        const isActive = st.key === detailStage;
        const stIdx = STAGES.findIndex(x => x.key === st.key);
        const curIdx = STAGES.findIndex(x => x.key === detailStage);
        const isPast = stIdx < curIdx;
        return `
          <button onclick="setDetailStage('${st.key}')" class="flex-1 py-2 rounded-lg text-[11px] font-medium transition-all cursor-pointer min-h-[44px] flex items-center justify-center ${
            isActive ? st.color + ' text-white' :
            isPast ? st.color + '/30 ' + st.text :
            'bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-700'
          }">${st.label}</button>
        `;
      }).join('')}
    </div>
  `;
  document.getElementById('detail-pipeline').innerHTML = pipelineHtml;

  // Left column - editable fields
  const fields = [
    { label: '名稱', key: 'name', value: s.name },
    { label: '來源', key: 'source', value: s.source },
    { label: '主辦機關', key: 'agency', value: s.agency },
    { label: '計畫類型', key: 'program_type', value: TYPE_LABELS[s.program_type] || s.program_type, type: 'select' },
    { label: '截止日期', key: 'deadline', value: s.deadline || '未設定', type: 'date' },
    { label: '補助金額', key: 'funding_amount', value: s.funding_amount },
    { label: '申請資格', key: 'eligibility', value: s.eligibility, multiline: true },
    { label: '補助範圍', key: 'scope', value: s.scope, multiline: true },
    { label: '必備文件', key: 'required_docs', value: s.required_docs, multiline: true },
    { label: '參考連結', key: 'reference_url', value: s.reference_url, link: true },
    { label: '備註', key: 'notes', value: s.notes, multiline: true },
  ];

  let leftHtml = `<div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-4 space-y-4">`;
  for (const f of fields) {
    const displayVal = f.value || '--';
    leftHtml += `
      <div class="group">
        <label class="text-xs font-medium text-slate-500 dark:text-slate-400 mb-1 block">${f.label}</label>
        <div class="flex items-start gap-2">
          ${f.multiline
            ? `<p class="text-sm text-slate-900 dark:text-slate-100 leading-relaxed flex-1">${displayVal}</p>`
            : f.link && f.value
              ? `<a href="${f.value}" target="_blank" class="text-sm text-blue-400 hover:text-blue-300 break-all flex-1">${displayVal}</a>`
              : `<span class="text-sm text-slate-900 dark:text-slate-100 flex-1">${displayVal}</span>`
          }
          <button class="opacity-0 group-hover:opacity-100 p-1 text-slate-500 hover:text-blue-400 transition-all cursor-pointer shrink-0">
            <i data-lucide="pencil" class="w-3.5 h-3.5"></i>
          </button>
        </div>
      </div>
    `;
  }
  leftHtml += `</div>`;
  document.getElementById('detail-left').innerHTML = leftHtml;

  // Right column
  let rightHtml = '';

  // Client / Partner
  rightHtml += `
    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-4">
      <h4 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">關聯組織</h4>
      <div class="space-y-3">
        <div>
          <label class="text-[11px] text-slate-500 mb-1 block">客戶</label>
          <select class="w-full bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-900 dark:text-slate-100 focus:border-blue-500 focus:outline-none transition-colors">
            <option value="">${s.client || '-- 選擇客戶 --'}</option>
            <option>台灣精密機械</option>
            <option>南科聯合科技</option>
            <option>永信智能系統</option>
          </select>
        </div>
        <div>
          <label class="text-[11px] text-slate-500 mb-1 block">夥伴</label>
          <select class="w-full bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-900 dark:text-slate-100 focus:border-blue-500 focus:outline-none transition-colors">
            <option value="">${s.partner || '-- 選擇夥伴 --'}</option>
            <option>創研顧問</option>
            <option>大同大學產學合作處</option>
          </select>
        </div>
      </div>
    </div>
  `;

  // Linked Deals
  rightHtml += `
    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-4">
      <div class="flex items-center justify-between mb-3">
        <h4 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">關聯商機</h4>
        <button class="p-1 text-blue-500 hover:bg-blue-500/10 rounded cursor-pointer"><i data-lucide="plus" class="w-4 h-4"></i></button>
      </div>
      ${s.deals.length > 0 ? s.deals.map(d => `
        <div class="p-3 bg-slate-100 dark:bg-slate-800 rounded-lg mb-2 last:mb-0">
          <div class="flex items-center justify-between">
            <span class="text-sm font-medium text-slate-900 dark:text-slate-100">${d.name}</span>
            <span class="px-2 py-0.5 rounded-full text-[11px] font-medium bg-blue-400/10 text-blue-400">${d.stage}</span>
          </div>
          <span class="text-xs text-slate-500 mt-1 block">${d.amount}</span>
        </div>
      `).join('') : '<p class="text-xs text-slate-500">尚無關聯商機</p>'}
    </div>
  `;

  // Related Intel
  rightHtml += `
    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-4">
      <div class="flex items-center justify-between mb-3">
        <h4 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">相關情報</h4>
        <button class="p-1 text-blue-500 hover:bg-blue-500/10 rounded cursor-pointer"><i data-lucide="plus" class="w-4 h-4"></i></button>
      </div>
      ${s.intels.length > 0 ? s.intels.map(i => `
        <div class="flex items-center gap-2 py-2 border-b border-slate-200 dark:border-slate-700 last:border-0">
          <i data-lucide="zap" class="w-4 h-4 text-amber-400 shrink-0"></i>
          <div class="flex-1 min-w-0">
            <span class="text-sm text-slate-900 dark:text-slate-100 truncate block">${i.title}</span>
            <span class="text-[11px] text-slate-500">${i.date}</span>
          </div>
        </div>
      `).join('') : '<p class="text-xs text-slate-500">尚無相關情報</p>'}
    </div>
  `;

  // Files
  rightHtml += `
    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-4">
      <div class="flex items-center justify-between mb-3">
        <h4 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">檔案</h4>
        <button class="p-1 text-blue-500 hover:bg-blue-500/10 rounded cursor-pointer"><i data-lucide="upload" class="w-4 h-4"></i></button>
      </div>
      ${s.files.length > 0 ? s.files.map(f => `
        <div class="flex items-center gap-2 py-2 border-b border-slate-200 dark:border-slate-700 last:border-0">
          <i data-lucide="file-text" class="w-4 h-4 text-slate-400 shrink-0"></i>
          <div class="flex-1 min-w-0">
            <span class="text-sm text-slate-900 dark:text-slate-100 truncate block">${f.name}</span>
            <span class="text-[11px] text-slate-500">${f.size}</span>
          </div>
          <button class="p-1 text-slate-400 hover:text-blue-400 cursor-pointer"><i data-lucide="download" class="w-4 h-4"></i></button>
        </div>
      `).join('') : '<p class="text-xs text-slate-500">尚無檔案</p>'}
    </div>
  `;

  document.getElementById('detail-right').innerHTML = rightHtml;
  lucide.createIcons();
}

function setDetailStage(stageKey) {
  detailStage = stageKey;
  if (detailId) renderDetail(detailId);
}

// ===== NEW FORM HELPERS =====
let selectedType = null;
function selectType(el, type) {
  document.querySelectorAll('.type-btn').forEach(b => {
    b.classList.remove('border-blue-500', 'bg-blue-500/10', 'text-blue-400');
    b.classList.add('border-slate-200', 'dark:border-slate-700', 'text-slate-600', 'dark:text-slate-300');
  });
  el.classList.remove('border-slate-200', 'dark:border-slate-700', 'text-slate-600', 'dark:text-slate-300');
  el.classList.add('border-blue-500', 'bg-blue-500/10', 'text-blue-400');
  selectedType = type;
}

function resetTypeGrid() {
  selectedType = null;
  document.querySelectorAll('.type-btn').forEach(b => {
    b.classList.remove('border-blue-500', 'bg-blue-500/10', 'text-blue-400');
    b.classList.add('border-slate-200', 'dark:border-slate-700', 'text-slate-600', 'dark:text-slate-300');
  });
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  navigate('list');
});
</script>

</body>
